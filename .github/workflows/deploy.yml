name: React CI/CD to AWS S3

on:
    push:
        branches:
            - main # main 브랜치에 push될 때 실행됩니다.

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: 1. 깃허브 저장소 코드 불러오기
              uses: actions/checkout@v4

            - name: 2. Node.js 환경 세팅
              uses: actions/setup-node@v4
              with:
                  node-version: "20" # 최신 안정화 버전

            - name: 3. 필요한 패키지 설치 (npm install)
              run: npm install

            - name: 4. 리액트 프로젝트 빌드 (npm run build)
              run: npm run build

            - name: 5. AWS 자격 증명 설정 (Academy 환경)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
                  aws-region: us-east-1 # 본인의 AWS S3 리전으로 변경하세요 (예: ap-northeast-2)

            - name: 6. AWS S3로 빌드 폴더 배포 및 동기화
              # S3_BUCKET_NAME에는 S3 버킷의 이름이 들어가야 합니다.
              run: aws s3 sync ./build s3://${{ secrets.S3_BUCKET_NAME }} --delete
